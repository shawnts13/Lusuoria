server:
  port: ${PORT:8080}

spring:
  application:
    name: lusuoria-settlement

  datasource:
    url: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
    username: postgres.howghxmumvgririurroc
    password: 'hx19970704QQ!!'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3          # Render 免费版 512MB 内存，严格限制连接数
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 30000         # Supabase 免费版连接会断开，保持心跳

  jpa:
    hibernate:
      ddl-auto: update              # 首次部署后建议改为 validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          time_zone: Asia/Shanghai

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT
jwt:
  secret: ${JWT_SECRET:lusuoria-settlement-jwt-secret-2024-please-change-me}
  expiration: 86400000              # 24小时（毫秒）

# CORS 允许的前端域名
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://lusuoria-settlement.vercel.app}

# Actuator（Render 健康检查）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.lusuoria: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN